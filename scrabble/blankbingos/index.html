<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank Bingos</title>
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --border-color: #e2e8f0;
            --tile-bg: #f8fafc;
            --tile-border: #cbd5e1;
            --tile-text: #334155;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-wrapper {
            max-width: 1400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Card Styles */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        h1 {
            margin-top: 0;
            font-size: 28px;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        p {
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        /* Top Bar & Setup */
        .setup-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
        }

        .radio-group {
            display: flex;
            gap: 12px;
            background: var(--bg-color);
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .radio-group label {
            cursor: pointer;
            font-weight: 500;
        }

        input[type="file"] {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Buttons */
        button,
        .start-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgb(99 102 241 / 0.2);
        }

        button:hover,
        .start-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Score Box */
        .score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 16px;
            box-shadow: var(--shadow);
        }

        .score p {
            margin: 0;
            color: white;
            opacity: 0.9;
        }

        /* Main Game Layout */
        .main-layout {
            display: flex;
            gap: 24px;
            height: calc(100vh - 200px);
            min-height: 600px;
        }

        .left-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .right-panel {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Grid */
        .grid-container {
            flex-grow: 1;
            overflow-y: auto;
            position: relative;
            /* Crucial for our ghost layer to stick to */
            padding: 15px;
            border-radius: var(--radius);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.15);
            z-index: 1;
        }

        /* The Ghost Dog Layer */
        .grid-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('doggoscrabble.jpg');
            background-size: cover;
            background-position: center;
            opacity: var(--dog-opacity, 0);
            /* Starts at 0, JavaScript controls this! */
            z-index: -1;
            /* Keeps it behind the tiles */
            transition: opacity 0.5s ease-in-out;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 2px;
        }

        .grid div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--tile-bg);
            border: 2px solid var(--tile-border);
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            font-weight: bold;
            color: var(--tile-text);
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgb(0 0 0 / 0.05);
        }

        .grid div:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        /* Input Area */
        .input-area input {
            width: 100%;
            padding: 16px 20px;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 4px rgb(0 0 0 / 0.05);
        }

        .input-area input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgb(99 102 241 / 0.1);
        }

        /* Right Panel Lists */
        .list-card {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(2px);
            border-radius: var(--radius);
            padding: 16px;
        }

        .wordbox-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .wordbox {
            overflow-y: auto;
            flex-grow: 1;
            font-family: monospace;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .wordbox div,
        #hintBox div {
            padding: 6px 10px;
            border-radius: 6px;
            background: transparent;
            /* Changed from var(--bg-color) */
            transition: background-color 0.2s;
        }

        .wordbox div:hover,
        #hintBox div:hover {
            background: #e2e8f0;
        }

        /* Cheat Controls */
        #cheat-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: var(--tile-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
        }

        #cheat-controls input[type="number"] {
            width: 50px;
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
        }

        /* State Classes */
        .hidden {
            display: none !important;
        }

        .cleared {
            animation: popAndVanish 0.5s ease forwards;
            pointer-events: none;
        }

        @keyframes popAndVanish {
            0% {
                transform: scale(1);
                background-color: var(--primary);
                opacity: 1;
            }

            40% {
                transform: scale(1.1);
                background-color: var(--success);
                opacity: 1;
            }

            100% {
                transform: scale(0.9);
                opacity: 0;
                visibility: hidden;
            }
        }

        .partial {
            background-color: #fef3c7 !important;
            border-color: var(--warning) !important;
            color: #b45309 !important;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Universal Success Pulse for ANY correct word */
        /* Animation for the Input Box on every match */
        .tile-pulse {
            animation: popAndReset 0.5s ease forwards;
        }

        @keyframes popAndReset {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            40% {
                transform: scale(1.1);
                background-color: var(--success);
                opacity: 0.5;
                /* Dips in visibility briefly */
            }

            100% {
                transform: scale(1);
                opacity: 1;
                /* The background color will be set by your getTileColor function in JS */
            }
        }
    </style>
</head>

<body>
    <div id="game-background"></div>
    <div class="app-wrapper">

        <div class="card" id="info">
            <h1>Blank Bingos</h1>
            <p>This game helps you practice finding bingos that you (in theory) know. Upload a list of known words, or
                use the default (words containing AENRT). Known words appear in <span
                    style="color: var(--primary); font-weight: bold;">Blue</span>, unknowns in Black.</p>

            <div class="setup-bar" id="lexchoose">
                <input type="file" id="fileInput">
                <div class="radio-group">
                    <label><input type="radio" id="nwl" name="wordlist" value="NWL" checked /> WOW</label>
                    <label><input type="radio" id="csw" name="wordlist" value="CSW" /> CSW</label>
                </div>

                <div class="radio-group" style="align-items: center;">
                    <label for="targetCards" style="font-weight: 500;">Cards:</label>
                    <input type="number" id="targetCards" value="50" min="10" max="200"
                        style="width: 50px; padding: 4px; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit;">

                    <div style="width: 1px; height: 16px; background: var(--border-color); margin: 0 8px;"></div>

                    <label for="targetAnswers" style="font-weight: 500;">Answers:</label>
                    <input type="number" id="targetAnswers" value="100" min="10" max="1000"
                        style="width: 50px; padding: 4px; border: 1px solid var(--border-color); border-radius: 6px; font-family: inherit;">
                </div>

                <button id="startButton" onclick="startGame()" class="start-btn">Start Game</button>
            </div>
        </div>

        <div class="score hidden" id="scoreBox">
            <p>🎯 SCORES</p>
            <p id="score1"></p>
            <p id="score2"></p>
            <p id="score3"></p>
        </div>

        <div class="main-layout hidden" id="maincont">

            <div class="left-panel">
                <div class="card grid-container">
                    <div class="grid" id="grid"></div>
                </div>

                <div class="input-area card">
                    <input type="text" id="wordInput" placeholder="TYPE GUESS AND PRESS ENTER..." autocomplete="off">
                </div>

                <button id="cheat" onclick="enableCheatMode()"
                    style="align-self: flex-start; background: var(--text-muted);">Activate Help Tools</button>

                <div id="cheat-controls" class="hidden">
                    <button onclick="toggleAnimateGridSolve(this)" style="background: var(--text-main);">Animate
                        Blanks</button>
                    <div style="width: 1px; height: 24px; background: var(--border-color); margin: 0 8px;"></div>
                    <span style="font-size: 14px; font-weight: 500; color: var(--text-muted);">Click a tile for:</span>
                    <label><input type="radio" name="cheatMode" value="hint" checked> First few letters</label>
                    <input type="number" id="numInput" min="1" max="10" value="1">
                    <label><input type="radio" name="cheatMode" value="answer"> Answers</label>
                    <label><input type="radio" name="cheatMode" value="blank"> Blank values</label>
                    <button id="clearHints" style="margin-left: auto; background: var(--text-muted);">Clear</button>
                </div>
            </div>

            <div class="right-panel">
                <div class="card list-card">
                    <div class="wordbox-title">✅ Correct Words</div>
                    <div class="wordbox" id="wordBox"></div>
                </div>

                <div class="card list-card">
                    <div class="wordbox-title">💡 Hints</div>
                    <div class="wordbox" id="hintBox"></div>
                </div>

                <div class="card list-card">
                    <div class="wordbox-title">❌ Missed Words</div>
                    <div class="wordbox" id="wrongBox"></div>
                </div>
            </div>

        </div>

    </div>

    <script>
        const nwlRadio = document.getElementById('nwl');
        const cswRadio = document.getElementById('csw');
        let wordListType = nwlRadio.checked ? 'NWL' : 'CSW';

        nwlRadio.addEventListener('change', () => { if (nwlRadio.checked) wordListType = 'NWL'; });
        cswRadio.addEventListener('change', () => { if (cswRadio.checked) wordListType = 'CSW'; });

        let total1 = 0; let total2 = 0;
        let score1 = 0; let score2 = 0;
        let userWords = new Set();
        let userAlphagrams = new Set();
        let masterData = {};
        let gridWords = [];
        let wordCounts = {};
        let enteredWords = new Set();
        let hintLength = 1;

        // NEW: Generates an indigo heat-map based strictly on knowns left
        // 1. NEW RAINBOW COLOR SCHEME
        function getTileColor(n) {
            if (n === 0) return ""; // Let CSS handle solved/partial states

            // Distinct colors for 1 through 7+ knowns
            const rainbow = [
                "",          // 0 (handled above)
                <!-- "#ffb3ba",   // 1: Pastel Red -->
                "#ffdfba",   // 2: Pastel Orange
                "#ffffba",   // 3: Pastel Yellow
                "#baffc9",   // 4: Pastel Green
                "#bae1ff",   // 5: Pastel Blue
                "#c9c9ff",   // 6: Pastel Indigo
                "#e8baff"    // 7+: Pastel Violet
            ];

            // Cap at 7 so anything 7 or higher gets the violet color
            return rainbow[Math.min(n, 7)];
        }

        // 2. AGGRESSIVE FOCUS LISTENER
        // Forces focus back to the input anytime you click anywhere on the page
        document.body.addEventListener('click', function (e) {
            const wordInput = document.getElementById("wordInput");
            // We ignore clicks on other inputs (like the target sliders) so you can still use them!
            if (e.target.tagName !== 'INPUT' && wordInput) {
                wordInput.focus();
            }
        });

        function isKnownWord(word) {
            return userAlphagrams.has(word.split('').sort().join(''));
        }

        function updateScores() {
            let score3 = score1 + score2;
            let total3 = total1 + total2;
            let p1 = total1 > 0 ? ((score1 / total1) * 100).toFixed(1) : 0;
            let p2 = total2 > 0 ? ((score2 / total2) * 100).toFixed(1) : 0;
            let p3 = total3 > 0 ? ((score3 / total3) * 100).toFixed(1) : 0;

            document.getElementById("score1").textContent = `Known: ${score1}/${total1} (${p1}%)`;
            document.getElementById("score2").textContent = `Unknown: ${score2}/${total2} (${p2}%)`;
            document.getElementById("score3").textContent = `Total: ${score3}/${total3} (${p3}%)`;

            // Calculate how far along you are (0.0 to 1.0)
            let progress = 0;
            // Assuming your total possible score variable is 'total1' and current is 'score1'
            // (Update these variable names if you use different ones in your score tracker!)
            if (total1 > 0) {
                progress = score1 / total1;
            }
            if (progress > 1) progress = 1;

            // Send that progress number directly to our CSS ghost layer!
            const gridContainer = document.querySelector('.grid-container');
            if (gridContainer) {
                gridContainer.style.setProperty('--dog-opacity', progress);
            }
        }

        async function startGame() {
            processFile();
            document.getElementById("info").classList.add("hidden");
            document.getElementById("scoreBox").classList.remove("hidden");
            document.getElementById("maincont").classList.remove("hidden");
            setTimeout(() => document.getElementById("wordInput").focus(), 100);
        }

        async function loadMasterData() {
            try {
                let response = await fetch(wordListType === "NWL" ? "master.txt" : "masterCSW.txt");
                const text = await response.text();
                text.split('\n').forEach(line => {
                    const parts = line.trim().split(' ');
                    if (parts.length > 1) {
                        masterData[parts[0]] = parts.slice(1);
                    }
                });
            } catch (e) {
                console.warn("Could not load master data. Ensure files exist.", e);
            }
        }

        async function processFile() {
            await loadMasterData();
            const fileInput = document.getElementById('fileInput');
            let fileText = "";

            if (fileInput.files.length > 0) {
                fileText = await fileInput.files[0].text();
                localStorage.setItem('blankBingosWordList', fileText);
            } else if (localStorage.getItem('blankBingosWordList')) {
                fileText = localStorage.getItem('blankBingosWordList');
            } else {
                try {
                    const response = await fetch("default.txt");
                    fileText = await response.text();
                } catch (e) {
                    console.warn("Could not load default.txt", e);
                    return;
                }
            }

            userWords = new Set(fileText.split(/\r?\n/).map(l => l.trim().toUpperCase()).filter(l => l));
            userAlphagrams = new Set([...userWords].map(w => w.split('').sort().join('')));

            let gridHtml = "";
            gridWords = [];
            total1 = 0; total2 = 0;
            score1 = 0; score2 = 0;

            const targetCards = parseInt(document.getElementById('targetCards').value, 10) || 50;
            const targetAnswers = parseInt(document.getElementById('targetAnswers').value, 10) || 100;
            let currentTotalAnswers = 0;

            let candidates = [];
            let seenModified = new Set();

            for (let word of userWords) {
                for (let i = 0; i < word.length; i++) {
                    let chars = word.split("");
                    chars[i] = "?";
                    let modifiedWord = chars.sort().join("").replace(/[\r\n]+/g, '');

                    if (!seenModified.has(modifiedWord)) {
                        seenModified.add(modifiedWord);
                        if (masterData[modifiedWord]) {
                            const validWords = masterData[modifiedWord];
                            let m = validWords.length;
                            if (m <= 9) {
                                let n = validWords.filter(w => isKnownWord(w)).length;
                                candidates.push({ modifiedWord, n, m, words: validWords });
                            }
                        }
                    }
                }
            }

            wordCounts = {};
            candidates.sort(() => Math.random() - 0.5);

            for (let i = 0; i < targetCards; i++) {
                if (candidates.length === 0) break;

                let cardsLeft = targetCards - i;
                let safeMax = (targetAnswers - currentTotalAnswers) - (cardsLeft - 1);
                if (safeMax < 1) safeMax = 1;

                let selectedIdx = candidates.findIndex(c => c.m <= safeMax);
                if (selectedIdx === -1) {
                    let minM = Math.min(...candidates.map(c => c.m));
                    selectedIdx = candidates.findIndex(c => c.m === minM);
                }

                let bestFit = candidates.splice(selectedIdx, 1)[0];

                wordCounts[bestFit.modifiedWord] = { n: bestFit.n, m: bestFit.m, words: bestFit.words };
                gridWords.push(bestFit.modifiedWord);

                total1 += bestFit.n;
                total2 += (bestFit.m - bestFit.n);
                currentTotalAnswers += bestFit.m;

                let bgColor = getTileColor(bestFit.n);
                // NEW: Spans added for flexbox left/right alignment + dynamic background
                gridHtml += `<div id='${bestFit.modifiedWord}' style='background-color: ${bgColor}'><span>${bestFit.modifiedWord}</span> <span>${bestFit.n}|${bestFit.m}</span></div>`;
            }

            document.getElementById("grid").innerHTML = gridHtml;
            updateScores();
        }

        function isMatchingWithWildcard(guess, wildcardAlphagram) {
            const sortedGuess = guess.toUpperCase().split('').sort().join('');
            const baseAlphagram = wildcardAlphagram.replace('?', '').toUpperCase();
            for (let i = 0; i < sortedGuess.length; i++) {
                if (sortedGuess.slice(0, i) + sortedGuess.slice(i + 1) === baseAlphagram) return true;
            }
            return false;
        }

        document.getElementById("wordInput").addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                const inputWord = event.target.value.trim().toUpperCase();
                const inputBox = event.target;
                inputBox.value = "";

                if (!inputWord || enteredWords.has(inputWord)) return;

                // STEP 1: IS IT A REAL WORD AT ALL?
                let isRealWord = false;
                for (let key in masterData) {
                    if (masterData[key].includes(inputWord)) {
                        isRealWord = true;
                        break;
                    }
                }

                // If it's NOT a real word, it goes to the Wrong Box immediately.
                if (!isRealWord) {
                    addWordToWrongBox(inputWord);
                    return;
                }

                // STEP 2: IT IS A REAL WORD. Now, is it on our current grid?
                let matchedAnyTile = false;
                Object.keys(wordCounts).forEach(modifiedWord => {
                    if (wordCounts[modifiedWord].words.includes(inputWord)) {
                        matchedAnyTile = true;

                        wordCounts[modifiedWord].words = wordCounts[modifiedWord].words.filter(w => w !== inputWord);
                        wordCounts[modifiedWord].m--;

                        if (isKnownWord(inputWord)) {
                            wordCounts[modifiedWord].n--;
                            score1++;
                        } else {
                            score2++;
                        }

                        const gridCell = document.getElementById(modifiedWord);
                        if (gridCell) {
                            gridCell.classList.remove("tile-pulse");
                            void gridCell.offsetWidth;

                            if (wordCounts[modifiedWord].m > 0) {
                                gridCell.classList.add("tile-pulse");
                                if (wordCounts[modifiedWord].n > 0) {
                                    gridCell.style.backgroundColor = getTileColor(wordCounts[modifiedWord].n);
                                } else {
                                    gridCell.classList.add("partial");
                                }
                                gridCell.innerHTML = `<span>${modifiedWord}</span> <span>${wordCounts[modifiedWord].n}|${wordCounts[modifiedWord].m}</span>`;
                            } else {
                                gridCell.classList.remove("partial", "tile-pulse");
                                gridCell.classList.add("cleared");
                                gridCell.innerHTML = "";
                            }
                        }
                    }
                });

                // STEP 3: FINAL VERDICT
                if (matchedAnyTile) {
                    // It's a real word AND it was on the grid. Success!
                    enteredWords.add(inputWord);
                    addWordToWordBox(inputWord);
                    updateScores();
                } else {
                    // It's a real word, but NOT on this grid. 
                    // We do nothing! It doesn't go in "Correct" and it doesn't go in "Wrong."
                    // (Or you can console.log("Bonus word found") if you want to track them).
                }
            }
        });

        function addWordToWrongBox(word) {
            const wordBox = document.getElementById("wrongBox");
            const div = document.createElement("div");
            div.textContent = word;
            div.style.color = "var(--danger)";
            div.style.fontWeight = "bold";
            wordBox.appendChild(div);
            wordBox.scrollTop = wordBox.scrollHeight;
        }

        function addWordToWordBox(word) {
            const wordBox = document.getElementById("wordBox");
            const div = document.createElement("div");
            div.textContent = word;
            const known = isKnownWord(word);
            div.style.color = known ? "var(--primary)" : "var(--text-main)";
            div.style.fontWeight = known ? "bold" : "normal";
            wordBox.appendChild(div);
            wordBox.scrollTop = wordBox.scrollHeight;
        }

        function enableCheatMode() {
            document.getElementById("cheat").classList.add("hidden");
            document.getElementById("cheat-controls").classList.remove("hidden");
            document.getElementById("wordInput").focus();

            for (const key in wordCounts) {
                const element = document.getElementById(key);
                if (element) {
                    element.addEventListener("click", function () {
                        document.getElementById("wordInput").focus();
                        if (!element.classList.contains("cleared")) element.style.borderColor = "var(--text-muted)";
                        const cheatMode = document.querySelector('input[name="cheatMode"]:checked').value;

                        for (const word of wordCounts[key].words) {
                            const known = isKnownWord(word);
                            const color = known ? "#e0e7ff" : "transparent";
                            const textColor = known ? "var(--primary)" : "inherit";

                            if (cheatMode === "hint") {
                                addCheatItemToBox(word.slice(0, hintLength), color, textColor);
                            } else if (cheatMode === "blank") {
                                addCheatItemToBox("Blank: " + findRemovedChar(word, key), color, textColor);
                            } else {
                                addCheatItemToBox(word, color, textColor);
                            }
                        }
                    });
                }
            }
        }

        document.getElementById("clearHints").addEventListener("click", function () {
            document.getElementById("hintBox").innerHTML = "";
            document.getElementById("wordInput").focus();
        });

        function addCheatItemToBox(text, bgColor, textColor) {
            const wordBox = document.getElementById("hintBox");
            const div = document.createElement("div");
            div.style.backgroundColor = bgColor;
            div.style.color = textColor;
            div.style.fontWeight = textColor !== "inherit" ? "bold" : "normal";
            div.textContent = text;
            wordBox.appendChild(div);
            wordBox.scrollTop = wordBox.scrollHeight;
        }

        let isAnimating = false;
        let animationInterval = null;
        let originalGridWords = {};

        function toggleAnimateGridSolve(button) {
            document.getElementById("wordInput").focus();
            const keys = Object.keys(wordCounts);

            if (!isAnimating) {
                originalGridWords = {};
                keys.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) originalGridWords[id] = el.textContent;
                });

                let step = 0;
                animationInterval = setInterval(() => {
                    if (step >= 26) step = 0;
                    keys.forEach(id => {
                        const el = document.getElementById(id);
                        if (!el || el.classList.contains("cleared")) return;

                        const [originalWord, ...restParts] = originalGridWords[id].split(" ");
                        const rest = restParts.length ? " " + restParts.join(" ") : "";
                        const animated = originalWord.split("").map(c => c === "?" ? String.fromCharCode(65 + step) : c);
                        el.textContent = animated.sort().join("") + rest;
                    });
                    step++;
                }, 1000);

                button.textContent = "Stop Animation";
                button.style.background = "var(--danger)";
                isAnimating = true;
            } else {
                clearInterval(animationInterval);
                Object.entries(originalGridWords).forEach(([id, original]) => {
                    const el = document.getElementById(id);
                    if (el && !el.classList.contains("cleared")) {
                        // Restore structure safely when animation stops
                        let [word, nums] = original.trim().split(" ");
                        el.innerHTML = `<span>${word}</span> <span>${nums}</span>`;
                    }
                });
                button.textContent = "Animate Blanks";
                button.style.background = "var(--text-main)";
                isAnimating = false;
            }
        }

        function findRemovedChar(fullWord, wildcardAlphagram) {
            const base = wildcardAlphagram.replace('?', '').split('').sort().join('');
            for (let i = 0; i < fullWord.length; i++) {
                if ((fullWord.slice(0, i) + fullWord.slice(i + 1)).split('').sort().join('') === base) return fullWord[i];
            }
            return null;
        }

        document.getElementById('numInput').addEventListener('input', (e) => {
            hintLength = parseInt(e.target.value, 10);
        });

        window.addEventListener('DOMContentLoaded', (event) => {
            if (localStorage.getItem('blankBingosWordList')) {
                const startBtn = document.getElementById('startButton');
                startBtn.textContent = "Start Game (Using Saved List)";
                startBtn.style.backgroundColor = "var(--success)";
            }
        });
    </script>
</body>

</html>
